pronunciation_guide:
  title:
    en: "Pronunciation Foundation — Phát âm cơ bản"
  description:
    en: "Bắt đầu ở đây trước Topic 1. Học cách tự kiểm tra phát âm mà không cần IPA — dùng YouGlish và 7 âm người Việt thường sai nhất."

topic_1_introduce_yourself:
  title:
    en: "Topic 1 — Introduce Yourself as a Senior Engineer"
  description:
    en: "The most-used response in every interview. Internalize it so it feels completely natural — not memorized."

topic_2_system_design:
  title:
    en: "Topic 2 — System Design Fundamentals"
  description:
    en: "Speak your architectural thinking in English. Required for senior roles at companies paying $5,000+/month."

topic_3_api_microservices:
  title:
    en: "Topic 3 — API Architecture & Microservices"
  description:
    en: "REST, GraphQL, circuit breakers, service communication — explain these confidently in any interview."

topic_4_cloud_infrastructure:
  title:
    en: "Topic 4 — Cloud Infrastructure (AWS / GCP)"
  description:
    en: "Talk through real cloud decisions: compute, storage, networking, IAM, cost optimization."

topic_5_ai_ml_pipelines:
  title:
    en: "Topic 5 — AI/ML Pipelines & LLM Integration"
  description:
    en: "Your biggest differentiator. Speak fluently about LLM integration, prompt engineering, and production AI pipelines."

topic_6_automation_workflow:
  title:
    en: "Topic 6 — Automation & Workflow Engineering"
  description:
    en: "Explain workflow automation, queue-based processing, scheduling, and content pipelines."

topic_7_project_storytelling:
  title:
    en: "Topic 7 — Project Storytelling (STAR Method)"
  description:
    en: "Behavioral and project-based interviews at senior level. Master the STAR structure: Situation, Task, Action, Result."

topic_8_problem_solving:
  title:
    en: "Topic 8 — Technical Problem Solving"
  description:
    en: "Think out loud, debug systematically, evaluate trade-offs, and explain root cause analysis in English."

topic_9_team_communication:
  title:
    en: "Topic 9 — Team Communication & Code Review"
  description:
    en: "Daily remote work: standups, code reviews, technical proposals, async Slack communication."

topic_10_salary_negotiation:
  title:
    en: "Topic 10 — Salary Negotiation & Offer Discussion"
  description:
    en: "Close the deal. State expectations, respond to offers, negotiate upward, and discuss total compensation."

topic_11_daily_with_kids:
  title:
    en: "Topic 11 — Daily English with Kids (Parallel Track)"
  description:
    en: "Natural daily immersion. 8 phrase groups for parenting in English — morning routine to bedtime, every single day."
topic_12_llm_system_architecture:
  title:
    en: "Topic 12 — LLM System Architecture"
  description:
    en: "KPI 1 | Days 141–154. Build the English vocabulary and technical confidence to design, document, and present an LLM-powered backend system."
topic_13_prompt_engineering:
  title:
    en: "Topic 13 — Prompt Engineering"
  description:
    en: "KPI 2 | Days 155–168. Master the language and techniques for writing an LLM Best Practices Guide — from system prompts to eval frameworks."
topic_14_ai_tech_talks:
  title:
    en: "Topic 14 — AI Tech Talks in English"
  description:
    en: "KPI 4 | Days 169–182. Prepare and deliver two internal tech talks on AI topics in English — Tech Talk #1 (July) and Tech Talk #2 (November)."
topic_15_en_reading_lab:
  title:
    en: "Topic 15 — EN Reading Lab"
  description:
    en: "KPI 5 | Days 183–196. Build a weekly technical English reading habit using curated articles from ByteByteGo and Anthropic Research."
topic_16_en_technical_writing:
  title:
    en: "Topic 16 — EN Technical Writing"
  description:
    en: "KPI 6 + KPI 7 | Days 197–210. Write and publish your first English technical article and complete 4 English speaking sessions."
certification_prep:
  title:
    en: "Certification Prep — Generative AI with LLMs"
  description:
    en: "KPI 3 | May–September 2026. Structured study guide for the DeepLearning.AI 'Generative AI with LLMs' course on Coursera."
